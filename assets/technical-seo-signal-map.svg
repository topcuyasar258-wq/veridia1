<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Teknik SEO ve performans büyüme sistemi</title>
  <desc id="desc">Core Web Vitals, indeksleme, schema ve otomasyon katmanlarının dönüşüm ve görünürlüğe nasıl bağlandığını gösteren vektörel şema.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1210"/>
      <stop offset="100%" stop-color="#111917"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#173126"/>
      <stop offset="100%" stop-color="#10211a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#f3df9a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#c9a84c"/>
    </marker>
  </defs>
  <rect width="1200" height="720" rx="36" fill="url(#bg)"/>
  <circle cx="180" cy="128" r="160" fill="#1b2d22" opacity="0.35"/>
  <circle cx="1020" cy="608" r="170" fill="#20382a" opacity="0.22"/>
  <g filter="url(#shadow)">
    <rect x="72" y="72" width="300" height="180" rx="28" fill="url(#panel)" stroke="#c9a84c" stroke-opacity="0.24"/>
    <rect x="450" y="72" width="300" height="180" rx="28" fill="url(#panel)" stroke="#c9a84c" stroke-opacity="0.24"/>
    <rect x="828" y="72" width="300" height="180" rx="28" fill="url(#panel)" stroke="#c9a84c" stroke-opacity="0.24"/>
    <rect x="72" y="468" width="300" height="180" rx="28" fill="url(#panel)" stroke="#c9a84c" stroke-opacity="0.24"/>
    <rect x="450" y="468" width="300" height="180" rx="28" fill="url(#panel)" stroke="#c9a84c" stroke-opacity="0.24"/>
    <rect x="828" y="468" width="300" height="180" rx="28" fill="url(#panel)" stroke="#c9a84c" stroke-opacity="0.24"/>
    <rect x="355" y="284" width="490" height="152" rx="32" fill="#111d18" stroke="#f3df9a" stroke-opacity="0.42"/>
  </g>
  <g fill="#c9a84c" font-family="Arial, sans-serif" font-size="18" letter-spacing="2.8">
    <text x="108" y="116">PERFORMANS</text>
    <text x="486" y="116">ANLAMLANDIRMA</text>
    <text x="864" y="116">İNDEKSLEME</text>
    <text x="108" y="512">OTOMASYON</text>
    <text x="486" y="512">İÇ LİNKLEME</text>
    <text x="864" y="512">TİCARİ ETKİ</text>
  </g>
  <g fill="#f6f2e8" font-family="Arial, sans-serif">
    <text x="108" y="158" font-size="34" font-weight="700">Core Web Vitals</text>
    <text x="108" y="194" font-size="24">LCP, INP, CLS, TTFB ve render path</text>
    <text x="108" y="228" font-size="24">optimizasyonu ilk algıyı belirler.</text>
    <text x="486" y="158" font-size="34" font-weight="700">Schema ve EEAT</text>
    <text x="486" y="194" font-size="24">Yazar, yayıncı, hizmet ve bağlam sinyalleri</text>
    <text x="486" y="228" font-size="24">Google'ın içeriği daha net okumasını sağlar.</text>
    <text x="864" y="158" font-size="34" font-weight="700">Crawl budget</text>
    <text x="864" y="194" font-size="24">Canonical, sitemap ve robots kurgusu</text>
    <text x="864" y="228" font-size="24">değerli URL'leri öne çıkarır.</text>
    <text x="108" y="554" font-size="34" font-weight="700">n8n ve denetim akışları</text>
    <text x="108" y="590" font-size="24">404, performans eşiği ve indeksleme</text>
    <text x="108" y="624" font-size="24">sorunlarını büyümeden görünür yapar.</text>
    <text x="486" y="554" font-size="34" font-weight="700">Topik küme mantığı</text>
    <text x="486" y="590" font-size="24">Blog yazıları, hizmet sayfaları ve vaka</text>
    <text x="486" y="624" font-size="24">notları aynı otorite ağında çalışır.</text>
    <text x="864" y="554" font-size="34" font-weight="700">Daha fazla dönüşüm</text>
    <text x="864" y="590" font-size="24">Düşük bounce rate, güçlü form oranı ve</text>
    <text x="864" y="624" font-size="24">daha verimli reklam bütçesi ortaya çıkar.</text>
  </g>
  <g>
    <path d="M372 162H430" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M750 162H808" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M222 468V396" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M600 468V436" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M978 468V396" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  </g>
  <g fill="#f8f6ef" font-family="Arial, sans-serif" text-anchor="middle">
    <text x="600" y="336" font-size="22" letter-spacing="2.8" fill="#c9a84c">BÜYÜME MOTORU</text>
    <text x="600" y="376" font-size="46" font-weight="700">Teknik SEO + Web Performansı</text>
    <text x="600" y="414" font-size="24">Aynı trafikle daha fazla görünürlük, daha temiz tarama, daha yüksek güven</text>
  </g>
</svg>
