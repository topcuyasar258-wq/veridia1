services:
  postgres:
    image: postgres:16-alpine
    container_name: yankura-n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - yankura-n8n-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: yankura-n8n-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - yankura-n8n-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 10

  n8n-main:
    image: ${N8N_IMAGE}
    container_name: yankura-n8n-main
    restart: unless-stopped
    command: start
    ports:
      - "${N8N_PORT}:5678"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_SECURE_COOKIE: "false"
      NODE_FUNCTION_ALLOW_BUILTIN: crypto
      EXECUTIONS_MODE: queue
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      TZ: ${TZ}
      AI_PROVIDER: ${AI_PROVIDER}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      YANKURA_REPLY_TO: ${YANKURA_REPLY_TO}
      PUBLIC_WEBHOOK_BASE_URL: ${PUBLIC_WEBHOOK_BASE_URL}
      INTERNAL_WEBHOOK_BASE_URL: ${INTERNAL_WEBHOOK_BASE_URL}
      STATIC_SITE_BASE_URL: ${STATIC_SITE_BASE_URL}
      NOTION_API_KEY: ${NOTION_API_KEY}
      NOTION_API_VERSION: ${NOTION_API_VERSION}
      NOTION_LEADS_DATABASE_ID: ${NOTION_LEADS_DATABASE_ID}
      NOTION_CONTENT_CALENDAR_DATABASE_ID: ${NOTION_CONTENT_CALENDAR_DATABASE_ID}
      NOTION_REPORTS_DATABASE_ID: ${NOTION_REPORTS_DATABASE_ID}
      NOTION_COMPETITOR_ANALYSIS_DATABASE_ID: ${NOTION_COMPETITOR_ANALYSIS_DATABASE_ID}
      NOTION_BRIEFS_DATABASE_ID: ${NOTION_BRIEFS_DATABASE_ID}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${GOOGLE_SERVICE_ACCOUNT_EMAIL}
      GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY}
      GOOGLE_DELEGATED_USER: ${GOOGLE_DELEGATED_USER}
      GOOGLE_DRIVE_PROPOSALS_FOLDER_ID: ${GOOGLE_DRIVE_PROPOSALS_FOLDER_ID}
      GOOGLE_DRIVE_REPORTS_FOLDER_ID: ${GOOGLE_DRIVE_REPORTS_FOLDER_ID}
      GOOGLE_DRIVE_CLIENTS_ROOT_FOLDER_ID: ${GOOGLE_DRIVE_CLIENTS_ROOT_FOLDER_ID}
      GOOGLE_SLIDES_TEMPLATE_ID: ${GOOGLE_SLIDES_TEMPLATE_ID}
      GOOGLE_SHEETS_REPORTING_SPREADSHEET_ID: ${GOOGLE_SHEETS_REPORTING_SPREADSHEET_ID}
      GOOGLE_SHEETS_REPORTING_RANGE: ${GOOGLE_SHEETS_REPORTING_RANGE}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN}
      META_GRAPH_API_VERSION: ${META_GRAPH_API_VERSION}
      APIFY_TOKEN: ${APIFY_TOKEN}
      COMPETITOR_APIFY_ACTOR: ${COMPETITOR_APIFY_ACTOR}
      COMPETITOR_APIFY_INPUT_FIELD: ${COMPETITOR_APIFY_INPUT_FIELD}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      SLACK_WEBHOOK_NEW_PROPOSAL: ${SLACK_WEBHOOK_NEW_PROPOSAL}
      SLACK_WEBHOOK_CONTENT: ${SLACK_WEBHOOK_CONTENT}
      SLACK_WEBHOOK_STRATEGY: ${SLACK_WEBHOOK_STRATEGY}
      SLACK_WEBHOOK_OPERATIONS: ${SLACK_WEBHOOK_OPERATIONS}
      SLACK_WEBHOOK_ALERTS: ${SLACK_WEBHOOK_ALERTS}
    volumes:
      - yankura-n8n-data:/home/node/.n8n
      - ./workflows:/files/workflows

  n8n-worker:
    image: ${N8N_IMAGE}
    container_name: yankura-n8n-worker
    restart: unless-stopped
    command: worker --concurrency=5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      NODE_FUNCTION_ALLOW_BUILTIN: crypto
      EXECUTIONS_MODE: queue
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      TZ: ${TZ}
      AI_PROVIDER: ${AI_PROVIDER}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      YANKURA_REPLY_TO: ${YANKURA_REPLY_TO}
      PUBLIC_WEBHOOK_BASE_URL: ${PUBLIC_WEBHOOK_BASE_URL}
      INTERNAL_WEBHOOK_BASE_URL: ${INTERNAL_WEBHOOK_BASE_URL}
      STATIC_SITE_BASE_URL: ${STATIC_SITE_BASE_URL}
      NOTION_API_KEY: ${NOTION_API_KEY}
      NOTION_API_VERSION: ${NOTION_API_VERSION}
      NOTION_LEADS_DATABASE_ID: ${NOTION_LEADS_DATABASE_ID}
      NOTION_CONTENT_CALENDAR_DATABASE_ID: ${NOTION_CONTENT_CALENDAR_DATABASE_ID}
      NOTION_REPORTS_DATABASE_ID: ${NOTION_REPORTS_DATABASE_ID}
      NOTION_COMPETITOR_ANALYSIS_DATABASE_ID: ${NOTION_COMPETITOR_ANALYSIS_DATABASE_ID}
      NOTION_BRIEFS_DATABASE_ID: ${NOTION_BRIEFS_DATABASE_ID}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${GOOGLE_SERVICE_ACCOUNT_EMAIL}
      GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY}
      GOOGLE_DELEGATED_USER: ${GOOGLE_DELEGATED_USER}
      GOOGLE_DRIVE_PROPOSALS_FOLDER_ID: ${GOOGLE_DRIVE_PROPOSALS_FOLDER_ID}
      GOOGLE_DRIVE_REPORTS_FOLDER_ID: ${GOOGLE_DRIVE_REPORTS_FOLDER_ID}
      GOOGLE_DRIVE_CLIENTS_ROOT_FOLDER_ID: ${GOOGLE_DRIVE_CLIENTS_ROOT_FOLDER_ID}
      GOOGLE_SLIDES_TEMPLATE_ID: ${GOOGLE_SLIDES_TEMPLATE_ID}
      GOOGLE_SHEETS_REPORTING_SPREADSHEET_ID: ${GOOGLE_SHEETS_REPORTING_SPREADSHEET_ID}
      GOOGLE_SHEETS_REPORTING_RANGE: ${GOOGLE_SHEETS_REPORTING_RANGE}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN}
      META_GRAPH_API_VERSION: ${META_GRAPH_API_VERSION}
      APIFY_TOKEN: ${APIFY_TOKEN}
      COMPETITOR_APIFY_ACTOR: ${COMPETITOR_APIFY_ACTOR}
      COMPETITOR_APIFY_INPUT_FIELD: ${COMPETITOR_APIFY_INPUT_FIELD}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      SLACK_WEBHOOK_NEW_PROPOSAL: ${SLACK_WEBHOOK_NEW_PROPOSAL}
      SLACK_WEBHOOK_CONTENT: ${SLACK_WEBHOOK_CONTENT}
      SLACK_WEBHOOK_STRATEGY: ${SLACK_WEBHOOK_STRATEGY}
      SLACK_WEBHOOK_OPERATIONS: ${SLACK_WEBHOOK_OPERATIONS}
      SLACK_WEBHOOK_ALERTS: ${SLACK_WEBHOOK_ALERTS}
    volumes:
      - yankura-n8n-data:/home/node/.n8n
      - ./workflows:/files/workflows

volumes:
  yankura-n8n-data:
  yankura-n8n-postgres:
  yankura-n8n-redis:
